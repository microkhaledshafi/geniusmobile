<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Register | Genius Scientific ERP</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/purchase.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="layout">

    <div id="sidebar-container"></div>

    <main class="content">

        <div class="page-header">

            <div>
                <h1>Purchase Register</h1>
                <p>Manage supplier purchase invoices</p>
            </div>

            <button id="newPurchaseBtn" class="primary-btn">
                <i class="fa-solid fa-plus"></i>
                New Purchase
            </button>

        </div>

        <div class="stats-grid">

            <div class="stat-card">
                <span>Total Purchases</span>
                <h2 id="purchaseCount">0</h2>
            </div>

            <div class="stat-card">
                <span>Total Purchase Amount</span>
                <h2 id="purchaseAmount">₹0.00</h2>
            </div>

        </div>

        <div class="toolbar">

            <input
                type="text"
                id="searchPurchase"
                placeholder="Search supplier or invoice">

        </div>

        <div class="table-container">

            <table>

                <thead>

                <tr>

                    <th>Supplier Invoice</th>
                    <th>Purchase Date</th>
                    <th>Supplier</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Attachment</th>
                    <th>Action</th>

                </tr>

                </thead>

                <tbody id="purchaseBody">

                </tbody>

            </table>

        </div>

    </main>

</div>

<div id="deleteModal" class="modal">

    <div class="modal-content">

        <h3>Delete Purchase</h3>

        <p>
            Are you sure you want to delete this purchase?
        </p>

        <div class="modal-actions">

            <button id="cancelDeleteBtn" class="secondary-btn">
                Cancel
            </button>

            <button id="confirmDeleteBtn" class="danger-btn">
                Delete
            </button>

        </div>

    </div>

</div>

<script src="../js/layout.js"></script>
<script type="module" src="../js/purchase-register.js"></script>

</body>
</html>
