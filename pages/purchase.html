<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Register | Genius Scientific ERP</title>

    <link rel="stylesheet" href="../css/app.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/purchase.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="app">

    <!-- Sidebar -->
    <aside id="sidebar"></aside>

    <!-- Main -->
    <main class="main">

        <!-- Navbar -->
        <header id="navbar"></header>

        <!-- Page -->
        <section class="content">

            <div class="page-header">

                <h1>Purchase Register</h1>

                <button
                    id="newPurchaseBtn"
                    class="primary-btn">
                    <i class="fa-solid fa-plus"></i>
                    New Purchase
                </button>

            </div>

            <!-- Dashboard Cards -->

            <div class="stats-grid">

                <div class="stat-card">
                    <h3>Total Purchases</h3>
                    <span id="totalPurchaseCount">0</span>
                </div>

                <div class="stat-card">
                    <h3>Total Amount</h3>
                    <span id="totalPurchaseAmount">₹0.00</span>
                </div>

            </div>

            <!-- Toolbar -->

            <div class="toolbar">

                <input
                    type="text"
                    id="searchPurchase"
                    placeholder="Search Supplier / Invoice No">

            </div>

            <!-- Purchase Table -->

            <div class="table-container">

                <table class="table">

                    <thead>

                        <tr>

                            <th>Date</th>
                            <th>Supplier</th>
                            <th>Invoice No</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Attachment</th>
                            <th>Action</th>

                        </tr>

                    </thead>

                    <tbody id="purchaseBody">

                    </tbody>

                </table>

            </div>

        </section>

    </main>

</div>

<!-- Delete Modal -->

<div
    id="deleteModal"
    class="modal">

    <div class="modal-content">

        <h3>Delete Purchase?</h3>

        <p>
            This will remove the purchase and reverse the stock.
        </p>

        <div class="modal-actions">

            <button id="cancelDelete">
                Cancel
            </button>

            <button
                id="confirmDelete"
                class="danger-btn">
                Delete
            </button>

        </div>

    </div>

</div>

<script type="module" src="../js/layout.js"></script>
<script type="module" src="../js/purchase-register.js"></script>

</body>
</html>
