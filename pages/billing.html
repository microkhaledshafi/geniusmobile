<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Billing | Genius Scientific ERP</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Billing CSS -->
    <link rel="stylesheet" href="../billing/billing.css">
</head>

<body>

    <div id="billingApp">

        <!-- =====================================================
             PAGE HEADER
        ====================================================== -->

        <header id="appHeader">

            <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">

                <div class="container-fluid">

                    <a class="navbar-brand fw-bold" href="#">
                        <i class="bi bi-receipt"></i>
                        Genius Scientific ERP
                    </a>

                    <div class="d-flex align-items-center gap-2">

                        <button
                            id="btnHistory"
                            class="btn btn-light btn-sm">

                            <i class="bi bi-clock-history"></i>
                            History

                        </button>

                        <button
                            id="btnDashboard"
                            class="btn btn-warning btn-sm">

                            <i class="bi bi-speedometer2"></i>
                            Dashboard

                        </button>

                    </div>

                </div>

            </nav>

        </header>

        <!-- =====================================================
             MAIN CONTAINER
        ====================================================== -->

        <main class="container-fluid py-3">

            <!-- Invoice Header -->
            <section id="invoiceHeader"></section>

            <!-- Invoice Items -->
            <!-- =====================================================
     INVOICE ITEMS
====================================================== -->

<section id="invoiceTable" class="card shadow-sm mt-3">

    <div class="card-header d-flex justify-content-between align-items-center">

        <h5 class="mb-0">
            <i class="bi bi-cart"></i>
            Invoice Items
        </h5>

        <button
            id="btnAddItem"
            class="btn btn-primary btn-sm">

            <i class="bi bi-plus-circle"></i>
            Add Item

        </button>

    </div>

    <div class="card-body p-0">

        <div class="table-responsive">

            <table
                id="invoiceItemsTable"
                class="table table-bordered table-hover align-middle mb-0">

                <thead class="table-light">

                    <tr>

                        <th style="width:60px">#</th>

                        <th style="min-width:280px">
                            Product
                        </th>

                        <th style="width:90px">
                            Qty
                        </th>

                        <th style="width:110px">
                            Rate
                        </th>

                        <th style="width:90px">
                            Disc %
                        </th>

                        <th style="width:90px">
                            GST %
                        </th>

                        <th style="width:130px">
                            Amount
                        </th>

                        <th style="width:120px">
                            Tax
                        </th>

                        <th style="width:130px">
                            Total
                        </th>

                        <th style="width:70px">
                            Action
                        </th>

                    </tr>

                </thead>

                <tbody id="invoiceItemsBody">

                </tbody>

            </table>

        </div>

    </div>

</section>

<!-- =====================================================
     ROW TEMPLATE
====================================================== -->

<template id="invoiceRowTemplate">

<tr>

    <td class="row-number text-center fw-bold">
        1
    </td>

    <td>

        <input
            type="text"
            class="form-control product-name"
            readonly>

    </td>

    <td>

        <input
            type="number"
            class="form-control quantity"
            value="1"
            min="1">

    </td>

    <td>

        <input
            type="number"
            class="form-control rate"
            value="0"
            min="0"
            step="0.01">

    </td>

    <td>

        <input
            type="number"
            class="form-control discount"
            value="0"
            min="0"
            step="0.01">

    </td>

    <td>

        <input
            type="number"
            class="form-control gst"
            value="0"
            min="0"
            step="0.01">

    </td>

    <td class="amount text-end">

        0.00

    </td>

    <td class="tax text-end">

        0.00

    </td>

    <td class="total text-end fw-bold">

        0.00

    </td>

    <td class="text-center">

        <button
            type="button"
            class="btn btn-danger btn-sm remove-row">

            <i class="bi bi-trash"></i>

        </button>

    </td>

</tr>

</template>

            <!-- Totals -->
            <section id="invoiceTotals"></section>

            <!-- Payment -->
            <section id="paymentSection"></section>

        </main>

    </div>

    <!-- =====================================================
         MODALS
    ====================================================== -->

    <div id="modalContainer">

        <!-- Customer Modal -->

        <div id="customerModalContainer"></div>

        <!-- Product Search -->

        <div id="productModalContainer"></div>

        <!-- History -->

        <div id="historyModalContainer"></div>

    </div>

    <!-- =====================================================
         LOADING
    ====================================================== -->

    <div id="loadingOverlay" class="d-none">

        <div class="spinner-border text-primary"></div>

    </div>

    <!-- =====================================================
         TOAST
    ====================================================== -->

    <div id="toastContainer"></div>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Billing Loader -->

    <script type="module" src="../billing/billing.js"></script>

</body>

</html>
