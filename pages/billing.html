<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Billing | Genius Scientific ERP</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="../billing/billing.css">

</head>

<body>

<div id="billingApp">

    <header id="appHeader"></header>

    <main class="container-fluid py-3">

        <section id="invoiceHeader">
            <section id="invoiceHeader" class="card shadow-sm mb-3">

    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">

        <div>

            <h4 class="mb-0">Genius Scientific ERP</h4>

            <small>Sales Invoice</small>

        </div>

        <div>

            <button id="btnNewInvoice" class="btn btn-light btn-sm">
                New Invoice
            </button>

        </div>

    </div>

    <div class="card-body">

        <div class="row g-3">

            <div class="col-md-3">
                <label class="form-label">Invoice No</label>

                <input
                    id="invoiceNo"
                    class="form-control"
                    readonly>
            </div>

            <div class="col-md-3">

                <label class="form-label">Invoice Date</label>

                <input
                    type="date"
                    id="invoiceDate"
                    class="form-control">

            </div>

            <div class="col-md-6">

                <label class="form-label">Customer</label>

                <div class="input-group">

                    <input
                        id="customerSearch"
                        class="form-control"
                        placeholder="Search customer...">

                    <button
                        class="btn btn-success"
                        id="btnCustomer">

                        +

                    </button>

                </div>

            </div>

            <div class="col-md-4">

                <label class="form-label">GSTIN</label>

                <input
                    id="customerGST"
                    class="form-control"
                    readonly>

            </div>

            <div class="col-md-4">

                <label class="form-label">Phone</label>

                <input
                    id="customerPhone"
                    class="form-control"
                    readonly>

            </div>

            <div class="col-md-4">

                <label class="form-label">Salesman</label>

                <input
                    id="salesman"
                    class="form-control"
                    placeholder="Salesman">

            </div>

            <div class="col-12">

                <label class="form-label">Address</label>

                <textarea
                    id="customerAddress"
                    rows="2"
                    class="form-control"
                    readonly></textarea>

            </div>

        </div>

    </div>

</section>
        </section>

        <section id="invoiceTable"></section>

        <section id="invoiceTotals"></section>

        <section id="paymentSection"></section>

    </main>

</div>

<div id="modalContainer"></div>

<script
type="module"
src="../billing/billing.js"></script>

</body>

</html>
