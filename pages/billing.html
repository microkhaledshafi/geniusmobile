<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Billing | Genius Scientific ERP</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Billing CSS -->
    <link rel="stylesheet" href="../billing/billing.css">
</head>

<body>

    <div id="billingApp">

        <!-- =====================================================
             PAGE HEADER
        ====================================================== -->

        <header id="appHeader">

            <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">

                <div class="container-fluid">

                    <a class="navbar-brand fw-bold" href="#">
                        <i class="bi bi-receipt"></i>
                        Genius Scientific ERP
                    </a>

                    <div class="d-flex align-items-center gap-2">

                        <button
                            id="btnHistory"
                            class="btn btn-light btn-sm">

                            <i class="bi bi-clock-history"></i>
                            History

                        </button>

                        <button
                            id="btnDashboard"
                            class="btn btn-warning btn-sm">

                            <i class="bi bi-speedometer2"></i>
                            Dashboard

                        </button>

                    </div>

                </div>

            </nav>

        </header>

        <!-- =====================================================
             MAIN CONTAINER
        ====================================================== -->

        <main class="container-fluid py-3">

            <!-- Invoice Header -->
            <section id="invoiceHeader"></section>

            <!-- Invoice Items -->
            <section id="invoiceTable"></section>

            <!-- Totals -->
            <section id="invoiceTotals"></section>

            <!-- Payment -->
            <section id="paymentSection"></section>

        </main>

    </div>

    <!-- =====================================================
         MODALS
    ====================================================== -->

    <div id="modalContainer">

        <!-- Customer Modal -->

        <div id="customerModalContainer"></div>

        <!-- Product Search -->

        <div id="productModalContainer"></div>

        <!-- History -->

        <div id="historyModalContainer"></div>

    </div>

    <!-- =====================================================
         LOADING
    ====================================================== -->

    <div id="loadingOverlay" class="d-none">

        <div class="spinner-border text-primary"></div>

    </div>

    <!-- =====================================================
         TOAST
    ====================================================== -->

    <div id="toastContainer"></div>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Billing Loader -->

    <script type="module" src="../billing/billing.js"></script>

</body>

</html>
