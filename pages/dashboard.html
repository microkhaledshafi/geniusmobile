<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | Genius Scientific ERP</title>

<link rel="stylesheet" href="../css/app.css">
<link rel="stylesheet" href="../css/sidebar.css">
<link rel="stylesheet" href="../css/dashboard.css">

</head>

<body>

<div class="app">

    <aside id="sidebar"></aside>

    <main class="main">

        <header id="navbar"></header>

        <section class="content">

            <h1>Dashboard</h1>

            <p>Welcome to Genius Scientific ERP</p>

            <div class="cards">

                <div class="card">
                    <h3>Today's Sales</h3>
                    <h2 id="todaySales">₹0</h2>
                </div>

                <div class="card">
                    <h3>Today's Purchase</h3>
                    <h2 id="todayPurchase">₹0</h2>
                </div>

                <div class="card">
                    <h3>Products</h3>
                    <h2 id="productCount">0</h2>
                </div>

                <div class="card">
                    <h3>Customers</h3>
                    <h2 id="customerCount">0</h2>
                </div>
                <div class="dashboard-card" onclick="location.href='payments.html'">

    <div class="card-icon">
        <i class="fa-solid fa-money-bill-transfer"></i>
    </div>

    <div class="card-content">
        <h3>Payments</h3>
        <p>Receive & Pay</p>
    </div>

</div>

            </div>

        </section>

    </main>

</div>

<script type="module" src="../js/layout.js"></script>

<script type="module" src="../js/dashboard.js"></script>

</body>

</html>
