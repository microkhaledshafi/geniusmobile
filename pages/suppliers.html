<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suppliers | Genius Scientific ERP</title>

    <link rel="stylesheet" href="../css/app.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/suppliers.css">
</head>

<body>

<div class="app">

    <!-- Sidebar -->
    <aside id="sidebar"></aside>

    <!-- Main -->
    <main class="main">

        <!-- Navbar -->
        <header id="navbar"></header>

        <!-- Content -->
        <section class="content">

            <div class="page-header">

                <h1>Suppliers</h1>

                <button id="addSupplierBtn">
                    + Add Supplier
                </button>

            </div>

            <div class="toolbar">

                <input
                    type="text"
                    id="searchSupplier"
                    placeholder="Search Supplier / Phone / GST">

                <div class="supplier-count">
                    Total Suppliers :
                    <span id="supplierCount">0</span>
                </div>

            </div>

            <table class="table">

                <thead>

                    <tr>

                        <th>Supplier Name</th>
                        <th>Contact Person</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>GST</th>
                        <th>Address</th>
                        <th>Opening Balance</th>
                        <th>Created</th>
                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="supplierTable">

                </tbody>

            </table>

        </section>

    </main>

</div>

<!-- =====================================================
     SUPPLIER MODAL
====================================================== -->

<div id="supplierModal" class="modal">

    <div class="modal-content">

        <div class="modal-header">

            <h2 id="modalTitle">
                Add Supplier
            </h2>

            <span class="close" id="closeModal">
                &times;
            </span>

        </div>

        <form id="supplierForm">

            <input type="hidden" id="supplierId">

            <div class="form-grid">

                <div class="form-group">

                    <label>Supplier Name *</label>

                    <input
                        type="text"
                        id="supplierName"
                        required>

                </div>

                <div class="form-group">

                    <label>Contact Person</label>

                    <input
                        type="text"
                        id="contactPerson">

                </div>

                <div class="form-group">

                    <label>Phone</label>

                    <input
                        type="text"
                        id="phone">

                </div>

                <div class="form-group">

                    <label>Email</label>

                    <input
                        type="email"
                        id="email">

                </div>

                <div class="form-group">

                    <label>GST Number</label>

                    <input
                        type="text"
                        id="gst">

                </div>

                <div class="form-group">

                    <label>Opening Balance</label>

                    <input
                        type="number"
                        step="0.01"
                        value="0"
                        id="openingBalance">

                </div>

                <div class="form-group form-group-full">

                    <label>Address</label>

                    <textarea
                        id="address"
                        rows="3"></textarea>

                </div>

            </div>

            <div class="modal-footer">

                <button
                    type="submit"
                    id="saveSupplierBtn">

                    Save Supplier

                </button>

            </div>

        </form>

    </div>

</div>

<script type="module" src="../js/layout.js"></script>
<script type="module" src="../js/suppliers.js"></script>

</body>
</html>
