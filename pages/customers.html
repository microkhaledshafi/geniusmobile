<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers | Genius Scientific ERP</title>

    <link rel="stylesheet" href="../css/app.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/customers.css">
</head>

<body>

<div class="app">

    <!-- Sidebar -->
    <aside id="sidebar"></aside>

    <!-- Main Content -->
    <main class="main">

        <!-- Navbar -->
        <header id="navbar"></header>

        <!-- Page Content -->
        <section class="content">

            <div class="page-header">

                <h1>Customers</h1>

                <button id="addCustomerBtn">
                    + Add Customer
                </button>

            </div>

            <div class="toolbar">

                <input
                    type="text"
                    id="searchCustomer"
                    placeholder="Search Customer / Phone / GST">

                <div class="customer-count">
                    Total Customers :
                    <span id="customerCount">0</span>
                </div>

            </div>

            <table class="table">

                <thead>

                    <tr>

                        <th>Name</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>GST</th>
                        <th>Address</th>
                        <th>Opening Balance</th>
                        <th>Created</th>
                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="customerTable">

                </tbody>

            </table>

        </section>

    </main>

</div>

<!-- =====================================
     CUSTOMER MODAL
===================================== -->

<div id="customerModal" class="modal">

    <div class="modal-content">

        <div class="modal-header">

            <h2 id="modalTitle">
                Add Customer
            </h2>

            <span class="close" id="closeModal">
                &times;
            </span>

        </div>

        <form id="customerForm">

            <input type="hidden" id="customerId">

            <div class="form-grid">

                <div class="form-group">

                    <label>
                        Customer Name *
                    </label>

                    <input
                        type="text"
                        id="customerName"
                        required>

                </div>

                <div class="form-group">

                    <label>
                        Phone
                    </label>

                    <input
                        type="text"
                        id="phone">

                </div>

                <div class="form-group">

                    <label>
                        Email
                    </label>

                    <input
                        type="email"
                        id="email">

                </div>

                <div class="form-group">

                    <label>
                        GST Number
                    </label>

                    <input
                        type="text"
                        id="gst">

                </div>

                <div class="form-group">

                    <label>
                        Opening Balance
                    </label>

                    <input
                        type="number"
                        step="0.01"
                        id="openingBalance"
                        value="0">

                </div>

                <div class="form-group form-group-full">

                    <label>
                        Address
                    </label>

                    <textarea
                        id="address"
                        rows="3"></textarea>

                </div>

            </div>

            <div class="modal-footer">

                <button
                    type="submit"
                    id="saveCustomerBtn">

                    Save Customer

                </button>

            </div>

        </form>

    </div>

</div>

<script type="module" src="../js/layout.js"></script>
<script type="module" src="../js/customers.js"></script>

</body>
</html>
