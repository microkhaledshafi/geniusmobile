<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Products | Genius Scientific ERP</title>

    <link rel="stylesheet" href="../css/app.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/products.css">

</head>

<body>

<div class="app">

    <!-- Sidebar -->

    <aside id="sidebar"></aside>

    <!-- Main Content -->

    <main class="main">

        <!-- Navbar -->

        <header id="navbar"></header>

        <!-- Page -->

        <section class="content">

            <!-- Header -->

            <div class="page-header">

                <div>

                    <h1>Products</h1>

                    <p>

                        Manage products, stock, pricing and inventory.

                    </p>

                </div>

                <button
                    id="addProductBtn"
                    class="primary-btn">

                    + Add Product

                </button>

            </div>

            <!-- Toolbar -->

            <div class="toolbar">

                <input
                    type="text"
                    id="searchProduct"
                    placeholder="Search Product / Manufacturer / Pack Size / Category">

            </div>

            <!-- Product Table -->

            <div class="table-wrapper">

                <table class="table">

                    <thead>

                        <tr>

                            <th width="60">#</th>

                            <th>Product</th>

                            <th>Pack Size</th>

                            <th>Manufacturer</th>

                            <th>Category</th>

                            <th>HSN</th>

                            <th>GST</th>

                            <th>MRP</th>

                            <th>Purchase</th>

                            <th>Selling</th>

                            <th>Qty</th>

                            <th>Unit</th>

                            <th>Batch</th>

                            <th>Lot</th>

                            <th>Expiry</th>

                            <th width="160">

                                Action

                            </th>

                        </tr>

                    </thead>

                    <tbody id="productTable">

                        <tr>

                            <td colspan="16">

                                Loading Products...

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

            <!-- =====================================================
                 PRODUCT MODAL
            ====================================================== -->

            <div id="productModal" class="modal">

                <div class="modal-content product-modal">

                    <!-- Modal Header -->

                    <div class="modal-header">

                        <h2 id="modalTitle">

                            Add Product

                        </h2>

                        <span
                            class="close"
                            id="closeModal">

                            &times;

                        </span>

                    </div>

                    <!-- Product Form -->

                    <form id="productForm">

                        <input
                            type="hidden"
                            id="productId">

                        <div class="form-grid">

                            <!-- Product -->

                            <div class="form-group">

                                <label>

                                    Product Name *

                                </label>

                                <input
                                    type="text"
                                    id="productName"
                                    autocomplete="off"
                                    required>

                            </div>

                            <div class="form-group">

                                <label>

                                    Pack Size

                                </label>

                                <input
                                    type="text"
                                    id="packSize"
                                    placeholder="500 mL / 100 Tests / 25 Kg">

                            </div>

                            <!-- Company -->

                            <div class="form-group">

                                <label>

                                    Manufacturer

                                </label>

                                <input
                                    type="text"
                                    id="manufacturer">

                            </div>

                            <div class="form-group">

                                <label>

                                    Category

                                </label>

                                <input
                                    type="text"
                                    id="category">

                            </div>

                            <!-- Tax -->

                            <div class="form-group">

                                <label>

                                    HSN Code

                                </label>

                                <input
                                    type="text"
                                    id="hsn">

                            </div>

                            <div class="form-group">

                                <label>

                                    GST %

                                </label>

                                <input
                                    type="number"
                                    id="gst"
                                    min="0"
                                    step="0.01">

                            </div>

                            <!-- Prices -->

                            <div class="form-group">

                                <label>

                                    Purchase Rate

                                </label>

                                <input
                                    type="number"
                                    id="purchaseRate"
                                    min="0"
                                    step="0.01">

                            </div>

                            <div class="form-group">

                                <label>

                                    Selling Rate

                                </label>

                                <input
                                    type="number"
                                    id="sellingRate"
                                    min="0"
                                    step="0.01">

                            </div>

                            <div class="form-group">

                                <label>

                                    MRP

                                </label>

                                <input
                                    type="number"
                                    id="mrp"
                                    min="0"
                                    step="0.01">

                            </div>

                            <div class="form-group">

                                <label>

                                    Opening Stock

                                </label>

                                <input
                                    type="number"
                                    id="quantity"
                                    min="0">

                            </div>

                            <!-- Inventory -->

                            <div class="form-group">

                                <label>

                                    Unit

                                </label>

                                <input
                                    type="text"
                                    id="unit"
                                    placeholder="Bottle / Kit / Box">

                            </div>

                            <div class="form-group">

                                <label>

                                    Batch No.

                                </label>

                                <input
                                    type="text"
                                    id="batch">

                            </div>

                            <div class="form-group">

                                <label>

                                    Lot No.

                                </label>

                                <input
                                    type="text"
                                    id="lot">

                            </div>

                            <div class="form-group">

                                <label>

                                    Expiry Date

                                </label>

                                <input
                                    type="date"
                                    id="expiry">

                            </div>

                        </div>

                        <!-- Footer -->

                        <div class="modal-footer">

                            <button
                                type="button"
                                id="closeModalBtn"
                                class="secondary-btn">

                                Cancel

                            </button>

                            <button
                                type="submit"
                                id="saveProductBtn"
                                class="primary-btn">

                                Save Product

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </section>

    </main>

</div>

<!-- ===========================
     Loading Overlay
=========================== -->

<div id="loadingOverlay" class="loading-overlay" style="display:none;">

    <div class="loader"></div>

    <p>Please wait...</p>

</div>

<!-- ===========================
     Toast Notification
=========================== -->

<div id="toastContainer"></div>

<!-- ===========================
     Scripts
=========================== -->

<script type="module" src="../js/layout.js"></script>

<script type="module" src="../js/products.js"></script>

</body>

</html>
