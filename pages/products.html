<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Genius Scientific ERP</title>

    <link rel="stylesheet" href="../css/app.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/products.css">
</head>

<body>
<div class="form-grid">

    <!-- Row 1 -->

    <div class="form-group">
        <label>Product Name *</label>
        <input type="text" id="productName" required>
    </div>

    <div class="form-group">
        <label>Pack Size</label>
        <input type="text"
               id="packSize"
               placeholder="500 mL / 100 Tests / 25 Kg">
    </div>

    <!-- Row 2 -->

    <div class="form-group">
        <label>Manufacturer</label>
        <input type="text" id="manufacturer">
    </div>

    <div class="form-group">
        <label>Category</label>
        <input type="text" id="category">
    </div>

    <!-- Row 3 -->

    <div class="form-group">
        <label>HSN Code</label>
        <input type="text" id="hsn">
    </div>

    <div class="form-group">
        <label>GST %</label>
        <input type="number"
               id="gst"
               min="0"
               step="0.01">
    </div>

    <!-- Row 4 -->

    <div class="form-group">
        <label>MRP</label>
        <input type="number"
               id="mrp"
               min="0"
               step="0.01">
    </div>

    <div class="form-group">
        <label>Selling Rate</label>
        <input type="number"
               id="sellingRate"
               min="0"
               step="0.01">
    </div>

    <!-- Row 5 -->

    <div class="form-group">
        <label>Purchase Rate</label>
        <input type="number"
               id="purchaseRate"
               min="0"
               step="0.01">
    </div>

    <div class="form-group">
        <label>Opening Stock</label>
        <input type="number"
               id="quantity"
               min="0">
    </div>

    <!-- Row 6 -->

    <div class="form-group">
        <label>Unit</label>
        <input type="text"
               id="unit"
               placeholder="Bottle / Kit / Box">
    </div>

    <div class="form-group">
        <label>Batch No.</label>
        <input type="text" id="batch">
    </div>

    <!-- Row 7 -->

    <div class="form-group">
        <label>Lot No.</label>
        <input type="text" id="lot">
    </div>

    <div class="form-group">
        <label>Expiry Date</label>
        <input type="date" id="expiry">
    </div>

</div>
<div class="app">

    <aside id="sidebar"></aside>

    <main class="main">

        <header id="navbar"></header>

        <section class="content">

            <div class="page-header">
                <h1>Products</h1>

                <button id="addProductBtn">
                    + Add Product
                </button>
            </div>

            <div class="toolbar">
                <input
                    type="text"
                    id="searchProduct"
                    placeholder="Search Product / Manufacturer / Category">
            </div>

            <table class="table">

                <thead>

                <tr>
                   <th>Product</th>
<th>Pack Size</th>
<th>Manufacturer</th>
<th>Category</th>
<th>MRP</th>
<th>Selling</th>
<th>Purchase</th>
<th>GST</th>
<th>Qty</th>
<th>Unit</th>
<th>Batch</th>
<th>Lot</th>
<th>Expiry</th>
<th>Action</th>
                </tr>

                </thead>

                <tbody id="productTable">

                </tbody>

            </table>

        </section>

    </main>

</div>


<!-- ===========================
     Product Modal
============================ -->

<div id="productModal" class="modal">

    <div class="modal-content">

        <div class="modal-header">

            <h2 id="modalTitle">Add Product</h2>

            <span class="close" id="closeModal">&times;</span>

        </div>

        <form id="productForm">

            <input type="hidden" id="productId">

            <div class="form-grid">

                <div class="form-group">
    <label>Product Name *</label>
    <input
        type="text"
        id="productName"
        required>
</div>
                <div class="form-group">
    <label>Pack Size</label>
    <input
        type="text"
        id="packSize"
        placeholder="500 mL / 100 Tests / 25 Kg / 1 Litre">
</div>
                </div>

                <div class="form-group">
                    <label>Manufacturer</label>
                    <input
                        type="text"
                        id="manufacturer">
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <input
                        type="text"
                        id="category">
                </div>

                <div class="form-group">
                    <label>HSN Code</label>
                    <input
                        type="text"
                        id="hsn">
                </div>

                <div class="form-group">
                    <label>Purchase Rate</label>
                    <input
                        type="number"
                        id="purchaseRate"
                        step="0.01">
                </div>

                <div class="form-group">
                    <label>Selling Rate</label>
                    <input
                        type="number"
                        id="sellingRate"
                        step="0.01">
                </div>

                <div class="form-group">
                    <label>MRP</label>
                    <input
                        type="number"
                        id="mrp"
                        step="0.01">
                </div>

                <div class="form-group">
                    <label>GST %</label>
                    <input
                        type="number"
                        id="gst">
                </div>

                <div class="form-group">
                    <label>Opening Stock</label>
                    <input
                        type="number"
                        id="quantity">
                </div>

                <div class="form-group">
                    <label>Unit</label>
                    <input
                        type="text"
                        id="unit"
                        placeholder="Box / Kit / Bottle / Pack">
                </div>

                <div class="form-group">
                    <label>Batch No.</label>
                    <input
                        type="text"
                        id="batch">
                </div>

                <div class="form-group">
                    <label>Lot No.</label>
                    <input
                        type="text"
                        id="lot">
                </div>

                <div class="form-group">
                    <label>Expiry Date</label>
                    <input
                        type="date"
                        id="expiry">
                </div>

            </div>

            <div class="modal-footer">

                <button type="submit" id="saveProductBtn">
                    Save Product
                </button>

            </div>

        </form>

    </div>

</div>


<script type="module" src="../js/layout.js"></script>
<script type="module" src="../js/products.js"></script>

</body>
</html>
