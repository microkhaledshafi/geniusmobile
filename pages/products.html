<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Products | Genius Scientific ERP</title>

<link rel="stylesheet" href="../css/app.css">
<link rel="stylesheet" href="../css/sidebar.css">
<link rel="stylesheet" href="../css/products.css">

</head>

<body>

<div class="app">

    <aside id="sidebar"></aside>

    <main class="main">

        <header id="navbar"></header>

        <section class="content">

            <div class="page-header">

                <h1>Products</h1>

                <button id="addProductBtn">
                    + Add Product
                </button>

            </div>

            <div class="toolbar">

               <input
    type="text"
    id="searchProduct"
    placeholder="Search by Name / Code / Barcode">

            </div>

            <table class="table">

                <thead>

                    <tr>

                        <th>Code</th>
                        <th>Product</th>
                        <th>Category</th>
                        <th>MRP</th>
                        <th>Sale Rate</th>
                        <th>Stock</th>
                        <th>GST</th>
                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="productTable">

                </tbody>

            </table>

            <!-- Product Modal -->
<div id="productModal" class="modal">

    <div class="modal-content">

        <div class="modal-header">

            <h2 id="modalTitle">Add Product</h2>

            <span class="close" id="closeModal">&times;</span>

        </div>

        <form id="productForm">

            <input type="hidden" id="productId">

            <div class="form-grid">

                <div class="form-group">
                    <label>Product Code</label>
                    <input type="text" id="productCode">
                </div>

                <div class="form-group">
                    <label>Product Name *</label>
                    <input type="text" id="productName" required>
                </div>

                <div class="form-group">
                    <label>Barcode</label>
                    <input type="text" id="barcode">
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select id="category"></select>
                </div>

                <div class="form-group">
                    <label>Manufacturer</label>
                    <select id="manufacturer"></select>
                </div>

                <div class="form-group">
                    <label>HSN Code</label>
                    <input type="text" id="hsn">
                </div>

                <div class="form-group">
                    <label>GST %</label>
                    <input type="number" id="gst">
                </div>

                <div class="form-group">
                    <label>MRP</label>
                    <input type="number" id="mrp" step="0.01">
                </div>

                <div class="form-group">
                    <label>Purchase Rate</label>
                    <input type="number" id="purchaseRate" step="0.01">
                </div>

                <div class="form-group">
                    <label>Selling Rate</label>
                    <input type="number" id="sellingRate" step="0.01">
                </div>

                <div class="form-group">
                    <label>Opening Stock</label>
                    <input type="number" id="quantity">
                </div>

                <div class="form-group">
                    <label>Minimum Stock</label>
                    <input type="number" id="minStock">
                </div>

                <div class="form-group">
                    <label>Lot</label>
                    <input type="text" id="lot">
                </div>

                <div class="form-group">
                    <label>Expiry Date</label>
                    <input type="date" id="expiry">
                </div>

            </div>

            <div class="modal-footer">

                <button type="submit" id="saveProductBtn">
                    Save Product
                </button>

            </div>

        </form>

    </div>

</div>

        </section>

    </main>

</div>

<script type="module" src="../js/layout.js"></script>

<script type="module" src="../js/products.js"></script>

</body>

</html>
